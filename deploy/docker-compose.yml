services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: taskforge
      MYSQL_USER: taskforge
      MYSQL_PASSWORD: taskforge
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  migrate:
    image: migrate/migrate:v4.17.1
    user: "0:0"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro,Z
    command:
      [
        "-path", "/migrations",
        "-database",
        "mysql://taskforge:taskforge@tcp(mysql:3306)/taskforge?parseTime=true&multiStatements=true",
        "up"
      ]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: